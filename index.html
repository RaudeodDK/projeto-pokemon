<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokemon</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center">
                <div class="caixa-pokemon">
                    <p class="titulo-pokemon">Busca de Pokémon</p>
                    <div class="caixa-pesquisar">
                        <input class="input-pesquisar" type="text" name="" id=""
                            placeholder="Digite o nome do Pokémon...">
                        <button class="botao-pesquisar">Pesquisar</button>
                    </div>
                    <div id="resultado" class="card shadow d-none">
                        <div class="card-body">
                            <img id="pokeImg" src="" alt="Sprite do Pokémon" class="img-fluid mb-3">
                            <h3 id="pokeNome" class="text-capitalize"></h3>
                            <p class="mb-1"><strong>ID:</strong> <span id="pokeId"></span></p>
                            <p class="mb-1"><strong>Peso:</strong> <span id="pokePeso"></span></p>
                            <p class="mb-1"><strong>Altura:</strong> <span id="pokeAltura"></span></p>
                            <p class="mb-1"><strong>Tipo:</strong> <span id="pokeTipo"></span></p>
                        </div>
                    </div>
                    <div id="msgErro" class="alert alert-warning mt-3 d-none">
                        Pokémon não encontrado. Tente novamente.
                    </div>
                </div>


            </div>
        </div>




    </div>

</body>

</html>
